<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Un message de gratitude pour Corinne">
  <title>Merci Corinne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @property --border-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    :root {
      --rose:       #e8829a;
      --rose-light: #f09ab0;
      --gold:       #f0c060;
      --sage:       #7db894;
      --cream:      #fff4ed;
      --glow-color: rgba(232, 130, 154, 0.55);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0e0618;
      font-family: 'Quicksand', sans-serif;
      color: var(--cream);
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ════════════════════════════
       AURORA BACKGROUND
    ════════════════════════════ */
    .aurora {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      animation: blobDrift 18s ease-in-out infinite;
    }

    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #7a1840 0%, transparent 70%);
      top: -200px; left: -200px;
      opacity: 0.6;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, #3b0d5c 0%, transparent 70%);
      bottom: -180px; right: -150px;
      opacity: 0.65;
      animation-delay: -6s;
    }
    .blob-3 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, #8c2a10 0%, transparent 70%);
      top: 35%; left: 30%;
      opacity: 0.35;
      animation-delay: -12s;
    }

    @keyframes blobDrift {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(90px, -70px) scale(1.12); }
      66%       { transform: translate(-60px, 90px) scale(0.88); }
    }

    /* ════════════════════════════
       SPARKLE PARTICLES
    ════════════════════════════ */
    .sparkle {
      position: fixed;
      border-radius: 50%;
      background: white;
      pointer-events: none;
      z-index: 1;
      animation: sparkleRise linear infinite;
    }

    @keyframes sparkleRise {
      0%   { transform: translateY(105vh) scale(0); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.7; }
      100% { transform: translateY(-5vh) scale(1.4); opacity: 0; }
    }

    /* ════════════════════════════
       STAGE
    ════════════════════════════ */
    .stage {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ════════════════════════════
       BEFORE STATE
    ════════════════════════════ */
    #before {
      text-align: center;
      padding: 40px 30px;
      animation: entranceFade 1.2s ease both;
    }

    @keyframes entranceFade {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #before.hide {
      animation: exitFade 0.5s ease forwards;
    }

    @keyframes exitFade {
      to { opacity: 0; transform: translateY(-30px) scale(0.94); }
    }

    .hero-glow {
      position: relative;
      display: inline-block;
      margin-bottom: 30px;
    }

    .hero-glow::before {
      content: '';
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow-color) 0%, transparent 70%);
      animation: glowPulse 3s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1);    opacity: 0.7; }
      50%       { transform: scale(1.3);  opacity: 1; }
    }

    .hero-emoji {
      font-size: 5.5rem;
      display: block;
      position: relative;
      animation: emojiFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 0 18px var(--glow-color));
    }

    @keyframes emojiFloat {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50%       { transform: translateY(-14px) rotate(3deg); }
    }

    #before h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 400;
      font-size: clamp(2rem, 5vw, 3.2rem);
      color: var(--cream);
      text-shadow: 0 0 50px rgba(232,130,154,0.5);
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }

    #before p {
      font-size: 1.08rem;
      opacity: 0.65;
      max-width: 360px;
      margin: 0 auto 44px;
      line-height: 1.65;
    }

    /* Ghost button with glow */
    #revealBtn {
      position: relative;
      background: transparent;
      color: var(--cream);
      border: 1.5px solid rgba(240, 192, 96, 0.5);
      padding: 18px 52px;
      border-radius: 50px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.35s, color 0.35s, box-shadow 0.35s;
      box-shadow: 0 0 24px rgba(240,192,96,0.12), 0 0 0 0 rgba(240,192,96,0);
      animation: btnGlow 2.8s ease-in-out infinite;
    }

    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(240,192,96,0.1); }
      50%       { box-shadow: 0 0 44px rgba(240,192,96,0.3), 0 0 80px rgba(240,192,96,0.1); }
    }

    #revealBtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(240,192,96,0.12), rgba(232,130,154,0.1));
      opacity: 0;
      transition: opacity 0.35s;
    }

    #revealBtn:hover {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 60px rgba(240,192,96,0.4), 0 0 120px rgba(240,192,96,0.15);
    }

    #revealBtn:hover::before { opacity: 1; }
    #revealBtn:active { transform: scale(0.96); }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transform: scale(0);
      animation: rippleOut 0.7s linear;
      pointer-events: none;
    }

    @keyframes rippleOut {
      to { transform: scale(5); opacity: 0; }
    }

    /* ════════════════════════════
       FLASH
    ════════════════════════════ */
    #flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, #fff5ea 0%, white 100%);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
    }

    /* ════════════════════════════
       AFTER STATE
    ════════════════════════════ */
    #after {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #after.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* ════════════════════════════
       CARD WITH SHIMMER BORDER
    ════════════════════════════ */
    .card-wrap {
      position: relative;
      transform: scale(0.55) translateY(80px);
      opacity: 0;
      transition:
        transform 1.1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s,
        opacity   0.8s ease 0.1s;
    }

    .card-wrap.enter {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    /* Rotating shimmer border */
    .card-wrap::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 32px;
      background: conic-gradient(
        from var(--border-angle),
        transparent 25%,
        var(--gold) 37%,
        var(--rose-light) 50%,
        var(--gold) 63%,
        transparent 75%
      );
      animation: borderSpin 5s linear infinite;
      z-index: -1;
    }

    @keyframes borderSpin {
      to { --border-angle: 360deg; }
    }

    /* Subtle inner glow ring */
    .card-wrap::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 32px;
      background: transparent;
      box-shadow: 0 0 60px rgba(232,130,154,0.2), inset 0 0 30px rgba(232,130,154,0.05);
      z-index: -1;
    }

    .card {
      background: rgba(14, 6, 24, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 30px;
      padding: 60px 52px;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    .card h2 {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(2.2rem, 5vw, 3rem);
      background: linear-gradient(135deg, var(--cream) 0%, var(--rose-light) 45%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 8px;
      animation: shimmerText 4s ease-in-out infinite;
      background-size: 200% auto;
    }

    @keyframes shimmerText {
      0%, 100% { background-position: 0% center; }
      50%       { background-position: 100% center; }
    }

    .divider {
      width: 100px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--rose), var(--gold), var(--rose), transparent);
      margin: 20px auto 28px;
      animation: dividerGlow 3s ease-in-out infinite;
    }

    @keyframes dividerGlow {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; box-shadow: 0 0 10px var(--rose); }
    }

    .card p {
      font-size: 1.08rem;
      line-height: 1.85;
      opacity: 0.85;
      margin-bottom: 18px;
      min-height: 2em;
      text-align: left;
    }

    .signature {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--sage);
      font-size: 1.2rem;
      margin-top: 24px;
      text-align: center;
      opacity: 0;
      animation: fadeSig 1.2s ease 0.3s forwards;
    }

    @keyframes fadeSig {
      to { opacity: 1; }
    }

    /* ════════════════════════════
       BOUQUET
    ════════════════════════════ */
    .bouquet {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .bloom {
      font-size: 2.4rem;
      display: inline-block;
      transform: scale(0) rotate(-40deg);
      animation: bloomIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      filter: drop-shadow(0 0 6px rgba(232,130,154,0.5));
    }

    @keyframes bloomIn {
      0%   { transform: scale(0)    rotate(-40deg); }
      65%  { transform: scale(1.35) rotate(12deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }

    /* ════════════════════════════
       CANVAS CONFETTI
    ════════════════════════════ */
    #confetti-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 30;
    }

    /* ════════════════════════════
       ACCESSIBILITY
    ════════════════════════════ */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 520px) {
      .card { padding: 44px 28px; }
      #before h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<div class="aurora" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<canvas id="confetti-canvas" aria-hidden="true"></canvas>
<div id="flash" aria-hidden="true"></div>

<div class="stage">

  <!-- ── State 1 ── -->
  <div id="before">
    <div class="hero-glow" aria-hidden="true">
      <span class="hero-emoji">🌸</span>
    </div>
    <h1>Bonjour Corinne</h1>
    <p>Avant toute chose... il y a quelque chose qu'on aimerait te dire.</p>
    <button id="revealBtn">Clique ici &nbsp;🌷</button>
  </div>

  <!-- ── State 2 ── -->
  <div id="after" aria-live="polite">
    <div class="card-wrap">
      <div class="card">
        <div class="bouquet" id="bouquet" aria-hidden="true"></div>
        <h2>Merci, Corinne 💗</h2>
        <div class="divider"></div>
        <p id="t1"></p>
        <p id="t2"></p>
        <div class="signature">Avec toute notre gratitude &nbsp;🌼</div>
      </div>
    </div>
  </div>

</div>

<script>
  /* ── Sparkles ── */
  (function spawnSparkles() {
    for (let i = 0; i < 70; i++) {
      const s   = document.createElement('div');
      s.className = 'sparkle';
      const sz  = 1.5 + Math.random() * 2.5;
      s.style.cssText = [
        `left:${Math.random() * 100}vw`,
        `width:${sz}px`,
        `height:${sz}px`,
        `animation-duration:${8 + Math.random() * 16}s`,
        `animation-delay:${-Math.random() * 20}s`,
        `opacity:${0.2 + Math.random() * 0.5}`
      ].join(';');
      document.body.appendChild(s);
    }
  })();

  /* ── Confetti ── */
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const palette = ['#e8829a','#f09ab0','#f0c060','#c070e0','#7db894','#fff4ed','#ff5577','#ffd700'];
    const pieces  = [];

    for (let i = 0; i < 240; i++) {
      const a = Math.random() * Math.PI * 2;
      const v = 5 + Math.random() * 18;
      pieces.push({
        x:    canvas.width  * 0.5,
        y:    canvas.height * 0.5,
        vx:   Math.cos(a) * v,
        vy:   Math.sin(a) * v - 8,
        sz:   5 + Math.random() * 11,
        col:  palette[Math.floor(Math.random() * palette.length)],
        rot:  Math.random() * 360,
        rotV: (Math.random() - 0.5) * 14,
        g:    0.28 + Math.random() * 0.22,
        sh:   Math.random() < 0.45 ? 'rect' : Math.random() < 0.5 ? 'circle' : 'star'
      });
    }

    function drawStar(ctx, r) {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (i * 4 * Math.PI / 5) - Math.PI / 2;
        const a2 = ((i * 4 + 2) * Math.PI / 5) - Math.PI / 2;
        i === 0
          ? ctx.moveTo(r * Math.cos(a1), r * Math.sin(a1))
          : ctx.lineTo(r * Math.cos(a1), r * Math.sin(a1));
        ctx.lineTo((r / 2.2) * Math.cos(a2), (r / 2.2) * Math.sin(a2));
      }
      ctx.closePath();
    }

    let t0 = null;
    const DUR = 4500;

    function frame(ts) {
      if (!t0) t0 = ts;
      const elapsed = ts - t0;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const p of pieces) {
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += p.g;
        p.rot += p.rotV;
        const alpha = Math.max(0, 1 - elapsed / DUR);

        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle   = p.col;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);

        if (p.sh === 'rect') {
          ctx.fillRect(-p.sz / 2, -p.sz / 4, p.sz, p.sz / 2);
        } else if (p.sh === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.sz / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          drawStar(ctx, p.sz / 2);
          ctx.fill();
        }
        ctx.restore();
      }

      if (elapsed < DUR + 600) requestAnimationFrame(frame);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(frame);
  }

  /* ── Bouquet ── */
  const BOUQUET = ['🌸','🌷','🌹','🌺','🌻'];

  function buildBouquet() {
    const el = document.getElementById('bouquet');
    el.innerHTML = '';
    BOUQUET.forEach((f, i) => {
      const span = document.createElement('span');
      span.className   = 'bloom';
      span.textContent = f;
      span.style.animationDelay = (i * 0.22) + 's';
      el.appendChild(span);
    });
  }

  /* ── Typewriter ── */
  function typewrite(el, text, ms, done) {
    el.textContent = '';
    let i = 0;
    const id = setInterval(() => {
      el.textContent += text[i++];
      if (i >= text.length) { clearInterval(id); done && done(); }
    }, ms);
  }

  const LINE1 = "Grâce à toi et à la prestation « Évaluer son image pro », on a appris à se voir autrement, à se présenter avec plus de confiance, et à révéler ce qu'il y a de meilleur en nous.";
  const LINE2 = "Ta bienveillance, ta justesse et ton énergie ont fait toute la différence. Cette formation restera un vrai déclic pour nous.";

  function startText() {
    setTimeout(() => {
      typewrite(document.getElementById('t1'), LINE1, 28, () => {
        setTimeout(() => typewrite(document.getElementById('t2'), LINE2, 28), 400);
      });
    }, 900);
  }

  /* ── Reveal ── */
  document.getElementById('revealBtn').addEventListener('click', function(e) {
    /* ripple */
    const btn  = this;
    const rect = btn.getBoundingClientRect();
    const rip  = document.createElement('span');
    rip.className = 'ripple';
    const sz  = Math.max(btn.offsetWidth, btn.offsetHeight);
    Object.assign(rip.style, {
      width:  sz + 'px',
      height: sz + 'px',
      left:   (e.clientX - rect.left  - sz / 2) + 'px',
      top:    (e.clientY - rect.top   - sz / 2) + 'px'
    });
    btn.appendChild(rip);
    setTimeout(() => rip.remove(), 700);

    const before = document.getElementById('before');
    const after  = document.getElementById('after');
    const flash  = document.getElementById('flash');

    before.classList.add('hide');

    /* flash burst */
    setTimeout(() => {
      flash.style.transition = 'opacity 0.18s ease';
      flash.style.opacity    = '1';
      launchConfetti();

      setTimeout(() => {
        flash.style.transition = 'opacity 0.6s ease';
        flash.style.opacity    = '0';
        before.style.display   = 'none';
        after.classList.add('show');
        buildBouquet();
        startText();

        requestAnimationFrame(() =>
          requestAnimationFrame(() =>
            document.querySelector('.card-wrap').classList.add('enter')
          )
        );
      }, 180);
    }, 460);
  });
</script>

</body>
</html>
