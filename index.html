<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Un message de gratitude pour Corrine">
  <title>Merci Corrine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body { background: #f7efe6; overflow: hidden; }

    @keyframes drift {
      0%   { transform: translateY(-12vh) rotate(0deg); }
      100% { transform: translateY(114vh) rotate(380deg); }
    }
    @keyframes petalBurst {
      0%   { transform: translate(0, 0) rotate(0deg) scale(.3); opacity: 0; }
      10%  { opacity: 1; }
      100% { transform: translate(var(--tx), var(--ty)) rotate(var(--r)) scale(1); opacity: 0; }
    }
    @keyframes bloomGrow {
      0%   { transform: scale(0); opacity: 0; }
      62%  { transform: scale(1.09); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes msgIn {
      0%   { opacity: 0; transform: translateY(26px) scale(.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes glowIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes sway {
      0%, 100% { rotate: -3.2deg; }
      50%       { rotate:  3.2deg; }
    }
    @keyframes floatSoft {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-9px); }
    }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 10px 26px -10px rgba(201,108,140,.55); }
      50%       { box-shadow: 0 16px 34px -10px rgba(201,108,140,.75); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: .25; transform: scale(.85); }
      50%       { opacity:   1; transform: scale(1.15); }
    }
    @keyframes beforeOut {
      to { opacity: 0; transform: translateY(-20px) scale(.96); pointer-events: none; }
    }

    #stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(120% 120% at 50% 0%, #fdf8f1 0%, #f7efe6 48%, #f1e4da 100%);
      font-family: 'Nunito', system-ui, sans-serif;
      overflow: hidden;
    }

    #ambientLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    #beforeState {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 44px 40px;
      max-width: 560px;
      background: rgba(255,255,255,.62);
      border: 1px solid rgba(201,122,150,.18);
      border-radius: 28px;
      box-shadow: 0 30px 70px -30px rgba(122,74,82,.4);
      backdrop-filter: blur(8px);
      animation: floatSoft 6s ease-in-out infinite;
    }
    #beforeState.hide {
      animation: beforeOut .5s ease forwards;
    }

    #revealBtn {
      border: none;
      background: linear-gradient(135deg, #e58aa6 0%, #d4738f 55%, #c96c8c 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: .02em;
      padding: 16px 38px;
      border-radius: 999px;
      cursor: pointer;
      animation: btnPulse 2.6s ease-in-out infinite;
      transition: transform .2s ease;
    }
    #revealBtn:hover { transform: translateY(-2px) scale(1.03); }

    #afterState {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #glowBg {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(130% 120% at 50% 12%, #fbe6ec 0%, #f7ddd0 45%, #f3e7d2 100%);
      animation: glowIn 1.1s ease forwards;
    }

    #flowersRow {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 42vh;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1.5vw;
      z-index: 3;
      pointer-events: none;
    }

    #burstOrigin {
      position: absolute;
      left: 50%;
      top: 42%;
      z-index: 4;
      pointer-events: none;
    }

    #message {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 32px;
      max-width: 680px;
      margin-bottom: 16vh;
      animation: msgIn 1s cubic-bezier(.2,.8,.25,1) both;
    }

    #replayBtn {
      margin-top: 36px;
      border: 1px solid #e3c0c9;
      background: rgba(255,255,255,.55);
      color: #b86a84;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .04em;
      padding: 10px 20px;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      animation: msgIn .9s ease both;
      animation-delay: .9s;
      transition: background .2s;
    }
    #replayBtn:hover { background: rgba(255,255,255,.9); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

<div id="stage">
  <div id="ambientLayer"></div>
  <div id="afterState" style="display:none"></div>

  <div id="beforeState">
    <div style="font-size:34px;margin-bottom:10px;animation:twinkle 3s ease-in-out infinite;">🌷</div>
    <div style="font-family:'Nunito';font-weight:700;letter-spacing:.32em;text-transform:uppercase;font-size:11.5px;color:#c97a96;margin-bottom:16px;">une petite attention</div>
    <h1 style="font-family:'Cormorant Garamond';font-weight:600;font-size:clamp(46px,8vw,76px);line-height:1;margin:0 0 14px;color:#7a4a52;">Corrine,</h1>
    <p style="font-family:'Cormorant Garamond';font-style:italic;font-size:clamp(19px,2.4vw,24px);line-height:1.45;color:#6a5750;margin:0 0 34px;">on a préparé quelque chose rien que pour toi…</p>
    <button id="revealBtn">Ouvrir la surprise &nbsp;🌸</button>
    <div style="margin-top:18px;font-size:12.5px;color:#b39a93;">(appuie sur le bouton ✨)</div>
  </div>
</div>

<script>
  const rnd = (a, b) => a + Math.random() * (b - a);

  function el(tag, styles, children) {
    const d = document.createElement(tag);
    if (styles) {
      for (const [k, v] of Object.entries(styles)) {
        if (k.startsWith('--')) d.style.setProperty(k, v);
        else d.style[k] = v;
      }
    }
    if (children) children.forEach(c => c && d.appendChild(c));
    return d;
  }

  function petalStyle(color, w, h) {
    return { width: w + 'px', height: h + 'px', background: color, borderRadius: '54% 8% 54% 8%' };
  }

  /* ── Ambient falling petals ── */
  function makeAmbient() {
    const cols = ['#e89bb0','#f0b8c4','#e9a178','#f2c95e','#d97a98','#cfe0c3','#f4d4b0'];
    const layer = document.getElementById('ambientLayer');
    for (let i = 0; i < 18; i++) {
      const size = rnd(9, 22);
      const dur  = rnd(9, 19);
      const p = el('div', {
        ...petalStyle(cols[i % cols.length], size, size * 1.25),
        position: 'absolute',
        left: rnd(0, 100) + '%',
        top: '-12vh',
        opacity: rnd(0.35, 0.7),
        filter: 'blur(.2px)',
        animation: `drift ${dur}s linear infinite`,
        animationDelay: -rnd(0, dur) + 's'
      });
      layer.appendChild(p);
    }
  }

  /* ── Burst petals ── */
  function makeBurst(container) {
    const cols = ['#e58aa6','#f0b8c4','#e9a178','#f2c95e','#d4738f','#f4d4b0','#cfe0c3'];
    for (let i = 0; i < 56; i++) {
      const ang  = rnd(0, Math.PI * 2);
      const dist = rnd(200, 600);
      const tx   = Math.cos(ang) * dist;
      const ty   = Math.sin(ang) * dist + rnd(30, 160);
      const size = rnd(9, 22);
      const dur  = rnd(1000, 1900);
      const p = el('div', {
        ...petalStyle(cols[i % cols.length], size, size * 1.3),
        position: 'absolute',
        left: '0', top: '0',
        '--tx': tx + 'px',
        '--ty': ty + 'px',
        '--r':  rnd(-360, 360) + 'deg',
        animation: `petalBurst ${dur}ms cubic-bezier(.15,.7,.4,1) ${rnd(0, 140)}ms forwards`
      });
      container.appendChild(p);
    }
  }

  /* ── CSS Flower ── */
  function makeFlower(i, size, petalColor, centerColor, delay) {
    const n  = 7;
    const pw = size * 0.3;
    const ph = size * 0.56;

    const bloom = el('div', {
      position: 'relative',
      width: size + 'px', height: size + 'px',
      animation: `sway 4.5s ease-in-out infinite`,
      animationDelay: -rnd(0, 3) + 's'
    });

    for (let k = 0; k < n; k++) {
      bloom.appendChild(el('div', {
        position: 'absolute', left: '50%', top: '50%',
        width: pw + 'px', height: ph + 'px',
        background: petalColor, borderRadius: '50%',
        transformOrigin: 'center bottom',
        transform: `translate(-50%,-100%) rotate(${k * (360 / n)}deg)`,
        boxShadow: 'inset 0 -6px 10px -6px rgba(0,0,0,.12)'
      }));
    }

    bloom.appendChild(el('div', {
      position: 'absolute', left: '50%', top: '50%',
      width:  size * 0.34 + 'px',
      height: size * 0.34 + 'px',
      transform: 'translate(-50%,-50%)',
      background: `radial-gradient(circle at 38% 34%,#fce8a8,${centerColor})`,
      borderRadius: '50%', zIndex: '2',
      boxShadow: '0 1px 3px rgba(120,80,40,.25)'
    }));

    const stemH = rnd(120, 240);
    const stem  = el('div', {
      width: '6px', height: stemH + 'px',
      marginTop: '-4px',
      background: 'linear-gradient(#9bbf8f,#6f9a73)',
      borderRadius: '4px'
    });

    const leaf = el('div', {
      position: 'absolute',
      left:   i % 2 ? '58%' : '30%',
      top:    (size + stemH * 0.42) + 'px',
      width:  size * 0.42 + 'px',
      height: size * 0.24 + 'px',
      background:   '#7fa97f',
      borderRadius: '0 80% 0 80%',
      transform: i % 2 ? 'rotate(28deg)' : 'rotate(-28deg) scaleX(-1)'
    });

    const flower = el('div', {
      position: 'relative',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      transformOrigin: 'bottom center',
      animation: `bloomGrow 1s cubic-bezier(.2,.85,.25,1) both`,
      animationDelay: delay + 'ms'
    });

    flower.appendChild(bloom);
    flower.appendChild(stem);
    flower.appendChild(leaf);
    return flower;
  }

  function makeFlowers(container) {
    const palette = [
      ['#e58aa6','#e8a23a'], ['#d4738f','#f2c95e'], ['#f0a8b8','#e8a23a'],
      ['#e9a178','#d98a3a'], ['#cf86a8','#f2c95e'], ['#f2b6c4','#e8a23a'], ['#dd7e9a','#e8a23a']
    ];
    for (let i = 0; i < 7; i++) {
      const size = rnd(72, 120);
      const [pc, cc] = palette[i % palette.length];
      container.appendChild(makeFlower(i, size, pc, cc, 200 + i * 130));
    }
  }

  /* ── Reveal ── */
  function reveal() {
    const before   = document.getElementById('beforeState');
    const after    = document.getElementById('afterState');

    before.classList.add('hide');

    setTimeout(() => {
      before.style.display = 'none';
      after.style.display  = 'block';

      /* Glow background */
      after.appendChild(el('div', { position:'absolute',inset:'0',zIndex:'1',
        background:'radial-gradient(130% 120% at 50% 12%,#fbe6ec 0%,#f7ddd0 45%,#f3e7d2 100%)',
        animation:'glowIn 1.1s ease forwards' }));

      /* Flowers */
      const flowersRow = el('div', {
        position:'absolute', left:'0', right:'0', bottom:'0', height:'42vh',
        display:'flex', alignItems:'flex-end', justifyContent:'center',
        gap:'1.5vw', zIndex:'3', pointerEvents:'none'
      });
      makeFlowers(flowersRow);
      after.appendChild(flowersRow);

      /* Burst */
      const burst = el('div', { position:'absolute', left:'50%', top:'42%', zIndex:'4', pointerEvents:'none' });
      makeBurst(burst);
      after.appendChild(burst);

      /* Message */
      const msg = el('div', {
        position:'relative', zIndex:'5', textAlign:'center',
        padding:'32px', maxWidth:'680px', marginBottom:'16vh',
        animation:'msgIn 1s cubic-bezier(.2,.8,.25,1) both'
      });
      msg.innerHTML = `
        <div style="font-family:'Nunito';font-weight:700;letter-spacing:.32em;text-transform:uppercase;font-size:12px;color:#c97a96;margin-bottom:14px;animation:msgIn .9s ease both;animation-delay:.15s;">✿ avec tout notre cœur ✿</div>
        <h1 style="font-family:'Cormorant Garamond';font-weight:600;font-size:clamp(54px,9vw,104px);line-height:.98;margin:0 0 22px;color:#7a4a52;animation:msgIn .9s ease both;animation-delay:.25s;">Merci Corrine</h1>
        <p style="font-family:'Cormorant Garamond';font-style:italic;font-size:clamp(20px,2.6vw,27px);line-height:1.5;color:#6a5750;margin:0 auto 16px;max-width:540px;animation:msgIn .9s ease both;animation-delay:.42s;">Grâce à ta formation «&nbsp;Évaluer son image pro&nbsp;», tu nous as aidés à révéler le meilleur de nous‑mêmes.</p>
        <p style="font-size:clamp(15px,1.8vw,17.5px);line-height:1.65;color:#8a766e;margin:0 auto 30px;max-width:480px;animation:msgIn .9s ease both;animation-delay:.58s;">Ta bienveillance, ton écoute et tes précieux conseils ont fait toute la différence. 🌸</p>
        <div style="font-family:'Cormorant Garamond';font-size:clamp(18px,2.2vw,22px);color:#7a4a52;animation:msgIn .9s ease both;animation-delay:.72s;">Avec toute notre gratitude — ton groupe&nbsp;💐</div>
        <button id="replayBtn">✿ recommencer</button>
      `;
      after.appendChild(msg);

      document.getElementById('replayBtn').addEventListener('click', replay);
    }, 500);
  }

  /* ── Replay ── */
  function replay() {
    const before = document.getElementById('beforeState');
    const after  = document.getElementById('afterState');

    after.style.display  = 'none';
    after.innerHTML      = '';
    before.style.display = '';
    before.classList.remove('hide');
  }

  makeAmbient();
  document.getElementById('revealBtn').addEventListener('click', reveal);
</script>

</body>
</html>
